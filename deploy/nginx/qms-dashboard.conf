# =============================================================================
# QMS Analytics Dashboard — nginx reverse proxy + TLS termination
#
# TLS is terminated HERE. The app container stays plain HTTP on the isolated
# Docker network (nothing outside the compose network can reach app:3000).
# Mounted read-only into the `proxy` service by docker-compose.yml.
#
# Certificates — drop your CA-signed files into deploy/nginx/certs/ as:
#     qms-dashboard.crt   full chain: server cert + any intermediate(s)
#     qms-dashboard.key   private key  (git-ignored — must NEVER be committed)
# The CSR -> signed-cert flow is documented in DEPLOY.md.
#
# Hostname — this is a PLACEHOLDER FQDN. Replace qms.bank.local (both server_name
# lines below) with the real name the bank issues. It must match the CN/SAN on the
# certificate (see SETUP.md section 3).
# =============================================================================

# Proxy keepalive / (future) websocket upgrade handling.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream qms_app {
    server app:3000;
    keepalive 32;
}

# ---- HTTP :80 — redirect everything to HTTPS --------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name qms.bank.local;

    # Let plain-HTTP load-balancer/uptime probes hit health without a redirect.
    location = /api/health { proxy_pass http://qms_app; }

    location / { return 308 https://$host$request_uri; }
}

# ---- HTTPS :443 -------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name qms.bank.local;

    ssl_certificate     /etc/nginx/certs/qms-dashboard.crt;
    ssl_certificate_key /etc/nginx/certs/qms-dashboard.key;

    # Modern, security-review-friendly TLS baseline.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS: force HTTPS for a year. Safe once you're committed to TLS end-to-end;
    # remove this line if the same hostname must still answer over plain HTTP.
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Uploaded logo + message attachments pass through here.
    client_max_body_size 25m;

    location / {
        proxy_pass http://qms_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $host;
        # Auth.js reads this to learn the original scheme was HTTPS and to stamp
        # Secure / __Secure- session cookies. It MUST say "https".
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Server-Sent Events (live data-refresh + message notifications): never
        # buffer these and don't cut the long-lived connection early.
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 1h;
    }
}
